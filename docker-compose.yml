services:

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydb
    depends_on:
      - db
    networks:
      my_ipvlan:
        ipv4_address: 192.168.200.10

  db:
    build: ./db
    container_name: postgresdb
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      my_ipvlan:
        ipv4_address: 192.168.200.11

volumes:
  pgdata:

networks:
  my_ipvlan:
    driver: ipvlan
    driver_opts:
      parent: eth0   # Linux interface
    ipam:
      config:
        - subnet: 192.168.200.0/24
          gateway: 192.168.200.1